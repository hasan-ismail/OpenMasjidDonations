<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" role="img" aria-label="OpenMasjid Donations — preview">
  <defs>
    <linearGradient id="scene" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c3a4d"/>
      <stop offset="0.48" stop-color="#082230"/>
      <stop offset="1" stop-color="#020a12"/>
    </linearGradient>
    <linearGradient id="emblem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="aura" cx="0.3" cy="0.25" r="0.8">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#scene)"/>
  <rect width="1280" height="800" fill="url(#aura)"/>

  <!-- top bar -->
  <g transform="translate(64,48)" fill="#F4F7FB" font-family="Segoe UI, system-ui, sans-serif">
    <circle cx="12" cy="12" r="12" fill="#22D3EE" opacity="0.18"/>
    <path d="M5 12c4 4 14 4 18 0-4 2-14 2-18 0Z" fill="#22D3EE" transform="translate(0,2)"/>
    <text x="36" y="18" font-size="20" font-weight="700">OpenMasjid Donations</text>
  </g>

  <!-- glass hero card -->
  <g transform="translate(340,210)">
    <rect width="600" height="380" rx="20" fill="rgba(15,32,64,0.68)" stroke="rgba(125,200,232,0.18)" stroke-width="1.5"/>
    <circle cx="300" cy="92" r="40" fill="url(#emblem)"/>
    <path d="M300 110c-15-11-26-20-26-32a13 13 0 0 1 26-5 13 13 0 0 1 26 5c0 12-11 21-26 32Z" fill="#F59E0B" transform="translate(0,-6)"/>
    <text x="300" y="186" text-anchor="middle" fill="#F4F7FB" font-family="Segoe UI, system-ui, sans-serif" font-size="40" font-weight="700">Welcome</text>
    <text x="300" y="230" text-anchor="middle" fill="#9FACC2" font-family="Segoe UI, system-ui, sans-serif" font-size="19">Your masjid's donation page is getting ready.</text>
    <text x="300" y="258" text-anchor="middle" fill="#9FACC2" font-family="Segoe UI, system-ui, sans-serif" font-size="19">Create appeals and take card donations with Stripe.</text>
    <rect x="120" y="296" width="360" height="44" rx="10" fill="rgba(3,13,26,0.45)" stroke="rgba(148,175,210,0.14)"/>
    <text x="300" y="324" text-anchor="middle" fill="#9FACC2" font-family="Segoe UI, system-ui, sans-serif" font-size="15">Self-hosted &amp; private · cards go straight to Stripe</text>
  </g>
</svg>
