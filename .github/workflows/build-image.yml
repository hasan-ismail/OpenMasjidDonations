name: Build image

# Builds this app's Dockerfile multi-arch (amd64 + arm64) and pushes to GHCR as
#   ghcr.io/<owner>/<repo-name>:<manifest version>   (+ :latest)
# The repo is named OpenMasjidDonations, so the image is
#   ghcr.io/openmasjid-solutions/openmasjiddonations
# which is what docker-compose.yml references.
#
# After the first run, make the GHCR package Public (owner -> Packages -> package
# settings) so masjid hosts can pull it without authentication.

on:
  push:
    branches: [main]
    tags: ['v*']
    # Changes that don't affect the image — skip the (slow) multi-arch build.
    # docker-compose.yml is NOT part of the image build context (the Dockerfile only
    # copies server/ + web/), so a compose change (e.g. pinning the image @sha256
    # digest) must not trigger a rebuild that would move the tag off the pinned digest.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'screenshots/**'
      - 'LICENSE'
      - 'docker-compose.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name + version
        id: meta
        run: |
          ver=$(grep -E '^version:' manifest.yaml | head -1 | sed -E 's/^version:[[:space:]]*//' | tr -d "\"' \r")
          [ -n "$ver" ] || ver=latest
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "name=$(echo "${GITHUB_REPOSITORY##*/}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Publishes the version-pinned (+ latest) image on main and on v* tags, like the
      # OpenMasjidDisplay template. Bump manifest.yaml `version:` for each meaningful
      # change so a pinned install stays stable (the catalog pins a git tag + version).
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.name }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Optional: tell the OpenMasjidAPPS catalog to rebuild after a release.
      # Requires a repo secret CATALOG_DISPATCH_TOKEN (a PAT with 'repo' scope).
      # - name: Notify catalog
      #   if: startsWith(github.ref, 'refs/tags/v')
      #   env:
      #     GH_TOKEN: ${{ secrets.CATALOG_DISPATCH_TOKEN }}
      #   run: gh api repos/OpenMasjid-Solutions/OpenMasjidAPPS/dispatches -f event_type=rebuild-catalog
